name: CI

# PRs carry the merge gate; the push trigger is restricted to main so each PR
# commit runs ONCE (an unrestricted push + pull_request pair runs everything
# twice). The main-push run is the post-merge verification.
on:
  push:
    branches: [main]
  pull_request:

# Rapid pushes to the same ref cancel the superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]   # trim to the platforms you actually ship
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # --- Toolchain setup: replace with your stack's setup action ---
